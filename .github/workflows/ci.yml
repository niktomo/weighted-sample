name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHPUnit 12.5+ requires PHP 8.3+
          - php: '8.2'
            phpunit: '^11.5'
          - php: '8.3'
            phpunit: '^12.0'
          - php: '8.4'
            phpunit: '^12.0'
          - php: '8.5'
            phpunit: '^12.0'

    name: PHP ${{ matrix.php }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.php == '8.4' && 'xdebug' || 'none' }}

      - name: Install dependencies
        run: |
          composer require --dev "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test
        if: matrix.php == '8.4'

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M
        if: matrix.php == '8.4'

      - name: Run PHPMD
        run: php -d error_reporting=24575 vendor/bin/phpmd src/ text phpmd.xml
        if: matrix.php == '8.4'

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage
        if: matrix.php != '8.4'

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml
        if: matrix.php == '8.4'
        env:
          XDEBUG_MODE: coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.php == '8.4'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
